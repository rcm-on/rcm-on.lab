<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCM-ON | Grafo Cognitivo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-color: #030305;
            --surface: #111116;
            --text-main: #e2e8f0;
            --emerald: #10B981;
            --indigo: #6366F1;
            --node-bg: #1e1e24;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .btn-back {
            color: #94a3b8;
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .btn-back:hover { color: var(--emerald); }

        .graph-container {
            width: 100%;
            max-width: 900px;
            height: 600px;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            display: flex;
            flex-direction: column-reverse; /* Bottom-Up Flow */
            justify-content: space-around;
            align-items: center;
            padding: 40px 0;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Líneas de conexión mediante pseudo-elementos */
        .layer {
            display: flex;
            gap: 40px;
            position: relative;
            z-index: 2;
        }

        .node {
            background: var(--node-bg);
            border: 1px solid #333;
            padding: 15px 25px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
        }

        .node:hover {
            transform: translateY(-5px);
            border-color: var(--indigo);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.3);
        }

        /* Colores por capas (Bottom-up) */
        .layer-1 .node { border-bottom: 3px solid #64748b; } /* Conocimientos */
        .layer-2 .node { border-bottom: 3px solid var(--indigo); } /* Engines */
        .layer-3 .node { border-bottom: 3px solid #f59e0b; } /* Procesamiento */
        .layer-4 .node { 
            border: 2px solid var(--emerald); 
            background: rgba(16, 185, 129, 0.1);
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .info-panel {
            margin-top: 30px;
            width: 100%;
            max-width: 900px;
            background: #111;
            padding: 20px;
            border-left: 4px solid var(--emerald);
            font-family: 'JetBrains Mono', monospace;
            color: #cbd5e1;
            min-height: 80px;
        }

        /* SVG para dibujar las conexiones dinámicas */
        #connections {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="../index.html" class="btn-back">&larr; Volver al Hub</a>
        <h2 style="font-family: 'JetBrains Mono'; color: var(--indigo); margin-top: 15px;">Grafo Cognitivo: Bottom-Up</h2>
    </div>

    <div class="graph-container">
        <svg id="connections"></svg>

        <!-- Nivel 4: Cúspide -->
        <div class="layer layer-4">
            <div class="node" id="n-sym" data-info="SIMBIOSIS PERFECTA: El resultado final. El pensamiento arborescente estructurado a alta velocidad por la lógica de la IA.">Simbiosis Perfecta</div>
        </div>

        <!-- Nivel 3: Procesamiento -->
        <div class="layer layer-3">
            <div class="node" id="n-aacc" data-info="PROCESAMIENTO ARBORESCENTE: Mapeo mental de múltiples variables simultáneas. Identificación de patrones invisibles.">Pensamiento AACC</div>
            <div class="node" id="n-foco" data-info="HIPERFOCO: Ejecución intensa y sin fricciones de una visión arquitectónica.">Hiperfoco Arquitectónico</div>
        </div>

        <!-- Nivel 2: Motores / IA -->
        <div class="layer layer-2">
            <div class="node" id="n-ai" data-info="IA COMPILERS: Modelos generativos (LLMs) que actúan como traductores de la abstracción mental a código y estructura real.">Motores IA</div>
            <div class="node" id="n-astra" data-info="CAPA ASTRA / CLOUD: Persistencia de datos y conectividad en tiempo real (Firebase/APIs).">Capa Astra (Nube)</div>
        </div>

        <!-- Nivel 1: Base Empírica (Bottom) -->
        <div class="layer layer-1">
            <div class="node" id="n-music" data-info="ACÚSTICA & DSP: Entendimiento matemático del sonido, frecuencias, armónicos y procesamiento de señales.">Acústica & DSP</div>
            <div class="node" id="n-code" data-info="LÓGICA DE PROGRAMACIÓN: Bases sólidas en algoritmos, estructuras de datos y desarrollo de software.">Lógica Estructural</div>
            <div class="node" id="n-exp" data-info="EXPERIENCIA EMPÍRICA: Resolución de problemas reales y visión de producto tecnológico.">Experiencia Empírica</div>
        </div>
    </div>

    <div class="info-panel" id="info-display">
        > Inicializando Grafo... Selecciona un nodo para analizar el flujo.
    </div>

    <script>
        // Lógica de interacción y dibujo de líneas del Grafo
        const infoDisplay = document.getElementById('info-display');
        const svg = document.getElementById('connections');
        
        document.querySelectorAll('.node').forEach(node => {
            node.addEventListener('mouseover', (e) => {
                infoDisplay.innerText = `> ${e.target.dataset.info}`;
            });
            node.addEventListener('mouseout', () => {
                infoDisplay.innerText = "> Esperando input sensorial...";
            });
        });

        // Dibuja líneas entre capas
        function drawLine(id1, id2) {
            const el1 = document.getElementById(id1);
            const el2 = document.getElementById(id2);
            if(!el1 || !el2) return;

            const rect1 = el1.getBoundingClientRect();
            const rect2 = el2.getBoundingClientRect();
            const containerRect = svg.getBoundingClientRect();

            const x1 = rect1.left + (rect1.width/2) - containerRect.left;
            const y1 = rect1.top - containerRect.top; // Arriba del nodo inferior
            
            const x2 = rect2.left + (rect2.width/2) - containerRect.left;
            const y2 = rect2.bottom - containerRect.top; // Abajo del nodo superior

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            // Curva de bezier para hacerla más orgánica (estilo neuronal)
            const d = `M ${x1} ${y1} C ${x1} ${(y1+y2)/2}, ${x2} ${(y1+y2)/2}, ${x2} ${y2}`;
            
            line.setAttribute('d', d);
            line.setAttribute('stroke', 'rgba(99, 102, 241, 0.2)');
            line.setAttribute('stroke-width', '2');
            line.setAttribute('fill', 'none');
            svg.appendChild(line);
        }

        // Conectar nodos (Bottom -> Up)
        window.onload = () => {
            // Capa 1 a 2
            drawLine('n-music', 'n-ai'); drawLine('n-music', 'n-astra');
            drawLine('n-code', 'n-ai'); drawLine('n-code', 'n-astra');
            drawLine('n-exp', 'n-ai');
            
            // Capa 2 a 3
            drawLine('n-ai', 'n-aacc'); drawLine('n-ai', 'n-foco');
            drawLine('n-astra', 'n-foco');
            
            // Capa 3 a 4
            drawLine('n-aacc', 'n-sym');
            drawLine('n-foco', 'n-sym');
        };

        window.onresize = () => {
            svg.innerHTML = '';
            window.onload(); // Redibujar al cambiar tamaño
        };
    </script>
</body>
</html>
