<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCM-ON | DSP ENGINE LAB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-color: #030305;
            --surface: #111116;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --emerald: #10B981;
            --emerald-glow: rgba(16, 185, 129, 0.4);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-back {
            color: var(--text-muted);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .btn-back:hover { color: var(--emerald); }

        .synth-container {
            background: var(--surface);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .display-panel {
            background: #000;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            color: var(--emerald);
            text-shadow: 0 0 8px var(--emerald-glow);
            font-size: 0.85rem;
        }

        .harmonics-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .harmonic-item {
            background: rgba(255,255,255,0.03);
            padding: 4px;
            border-radius: 4px;
            text-align: center;
            border: 1px solid transparent;
            transition: all 0.1s;
        }

        .harmonic-item.active {
            color: var(--emerald);
            border-color: var(--emerald);
            background: rgba(16, 185, 129, 0.08);
        }

        /* Sonic Graphics / Visualizador de Espectro */
        .spectrum-container {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #222;
            border-radius: 6px;
            display: flex;
            align-items: flex-end;
            padding: 10px;
            box-sizing: border-box;
            gap: 2px;
        }

        .spectrum-bar {
            flex: 1;
            background: var(--emerald);
            box-shadow: 0 0 8px var(--emerald-glow);
            transition: height 0.05s ease;
            height: 0%;
        }

        .spectrum-waterfall {
            height: 100px;
            background: #000;
            border: 1px solid #222;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
        }
        
        #waterfall-canvas {
            width: 100%;
            height: 100%;
        }

        /* Keyboard */
        .keyboard {
            display: flex;
            position: relative;
            height: 180px;
            justify-content: center;
        }

        .key {
            position: relative;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }

        .key.white {
            width: 55px;
            height: 180px;
            background: linear-gradient(to bottom, #cbd5e1, #94a3b8);
            border: 1px solid #030305;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            z-index: 1;
            box-shadow: inset 0 -4px 8px rgba(0,0,0,0.3);
        }

        .key.white:hover { background: #e2e8f0; }
        .key.white.active {
            background: #f8fafc;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 12px var(--emerald-glow);
            border-bottom: 2px solid var(--emerald);
        }

        .key.black {
            width: 35px;
            height: 110px;
            background: linear-gradient(to bottom, #1e1e24, #000);
            border: 1px solid #333;
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
            position: absolute;
            z-index: 2;
            margin-left: -17.5px;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .key.black.active {
            background: #111;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 0 8px var(--emerald-glow);
            border-bottom: 2px solid var(--emerald);
        }

        /* Selector de Motor */
        .controls-panel {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        select {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 8px 12px;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="../index.html" class="btn-back">&larr; Volver al Hub Central</a>
        <h2 style="font-family: 'JetBrains Mono'; color: var(--emerald); margin:0;">DSP ENGINE</h2>
    </div>

    <div class="synth-container">
        <div class="display-panel">
            <div class="status-row">
                <span id="note-display">FREQ: STANDBY</span>
                <span>OSC: ADDITIVE | 12 PARCIALES</span>
            </div>
            <div class="harmonics-grid" id="harmonics-display">
                </div>
        </div>
        
        <div class="spectrum-container" id="spectrum-bars">
             </div>

        <div class="controls-panel">
            <select id="motor-select">
                <option value="piano">Max Richter Piano (Sine decay)</option>
                <option value="spectral">Spectral Harmonizer (Complex partials)</option>
                <option value="synthesis">Waveform Synth (Rich H2+H3)</option>
            </select>
        </div>

        <div class="keyboard">
            <div class="key white" data-note="261.63"></div> <div class="key black" data-note="277.18" style="left: 55px;"></div> <div class="key white" data-note="293.66"></div> <div class="key black" data-note="311.13" style="left: 110px;"></div> <div class="key white" data-note="329.63"></div> <div class="key white" data-note="349.23"></div> <div class="key black" data-note="369.99" style="left: 220px;"></div> <div class="key white" data-note="392.00"></div> <div class="key black" data-note="415.30" style="left: 275px;"></div> <div class="key white" data-note="440.00"></div> <div class="key black" data-note="466.16" style="left: 330px;"></div> <div class="key white" data-note="493.88"></div> <div class="key white" data-note="523.25"></div> </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let oscillators = {};
        const masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.2;
        masterGain.connect(audioCtx.destination);

        const harmonicsDisplay = document.getElementById('harmonics-display');
        const spectrumBars = document.getElementById('spectrum-bars');
        const motorSelect = document.getElementById('motor-select');
        
        // Inicializar pantallas
        for(let i=1; i<=12; i++) {
            // LCD de frecuencias
            const divH = document.createElement('div');
            divH.className = 'harmonic-item';
            divH.id = `h${i}`;
            divH.innerText = `H${i}: -- Hz`;
            harmonicsDisplay.appendChild(divH);
            
            // Barras de espectro
            const bar = document.createElement('div');
            bar.className = 'spectrum-bar';
            bar.id = `bar${i}`;
            spectrumBars.appendChild(bar);
        }

        // Definición de motores
        const motors = {
            piano: { decay: 1.5, multiplier: (i) => 1 / (i * i) },
            spectral: { decay: 3.0, multiplier: (i) => i % 2 === 0 ? 0.3/i : 0.8/i },
            synthesis: { decay: 0.8, multiplier: (i) => i === 2 || i === 3 ? 1 : 1/(i*i) }
        };

        function playTone(freq, keyElement) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const currentMotor = motors[motorSelect.value];
            document.getElementById('note-display').innerText = `FREQ: ${freq} Hz | FUNDAMENTAL ACTIVA`;
            
            // Actualizar visualizadores
            for(let i=1; i<=12; i++) {
                const hFreq = (freq * i).toFixed(1);
                
                // Actualizar LCD
                const hDiv = document.getElementById(`h${i}`);
                hDiv.innerText = `H${i}: ${hFreq} Hz`;
                hDiv.classList.add('active');
                
                // Actualizar Barras de Espectro
                const barDiv = document.getElementById(`bar${i}`);
                const intensity = currentMotor.multiplier(i) * 100;
                barDiv.style.height = `${intensity}%`;
            }

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + currentMotor.decay);
            
            osc.connect(gainNode);
            gainNode.connect(masterGain);
            
            osc.start();
            oscillators[freq] = osc;
            
            keyElement.classList.add('active');
        }

        function stopTone(freq, keyElement) {
            if (oscillators[freq]) {
                oscillators[freq].stop(audioCtx.currentTime + 0.1);
                delete oscillators[freq];
            }
            keyElement.classList.remove('active');
            
            // Apagar visualizadores
            document.getElementById('note-display').innerText = `FREQ: STANDBY`;
            for(let i=1; i<=12; i++) {
                document.getElementById(`h${i}`).classList.remove('active');
                document.getElementById(`bar${i}`).style.height = `0%`;
            }
        }

        document.querySelectorAll('.key').forEach(key => {
            const freq = parseFloat(key.dataset.note);
            key.addEventListener('mousedown', () => playTone(freq, key));
            key.addEventListener('mouseup', () => stopTone(freq, key));
            key.addEventListener('mouseleave', () => stopTone(freq, key));
            
            // Soporte táctil
            key.addEventListener('touchstart', (e) => { e.preventDefault(); playTone(freq, key); });
            key.addEventListener('touchend', (e) => { e.preventDefault(); stopTone(freq, key); });
        });
    </script>
</body>
</html>
